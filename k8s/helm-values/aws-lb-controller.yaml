# helm repo add eks https://aws.github.io/eks-charts
# Prefer scripts/install-aws-lb-controller.ps1 so vpcId and the IRSA role ARN
# are injected before Helm applies the chart.
clusterName: shopcloud-primary
region: us-east-1
vpcId: ""        # required: inject with --set vpcId=<eks-vpc-id>
image:
  tag: v2.8.2
serviceAccount:
  create: true
  name: aws-load-balancer-controller
  annotations:
    # Required: override this placeholder before install/upgrade.
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/shopcloud-primary-irsa-aws-lb-controller
replicaCount: 2
resources:
  requests: { cpu: 50m,  memory: 96Mi }
  limits:   { cpu: 200m, memory: 256Mi }
enableShield: false
enableWaf: false
enableWafv2: true
