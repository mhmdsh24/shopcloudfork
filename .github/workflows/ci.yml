name: CI

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "services/**"
      - "k8s/**"
      - "terraform/**"
      - ".github/workflows/**"
  push:
    branches: [dev, main]
    paths:
      - "services/**"
      - "k8s/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout, auth, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/${{ matrix.service }}/requirements.txt

      - name: Install service dependencies
        run: python -m pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Compile service
        run: python -m py_compile services/${{ matrix.service }}/app.py

  manifests:
    name: k8s-manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4

      - name: Render overlays
        env:
          AWS_ACCOUNT_ID: "000000000000"
        run: |
          set -euo pipefail
          for overlay in us-east-1 dev-us-east-1 eu-west-1; do
            kubectl kustomize "k8s/overlays/$overlay" > "rendered-$overlay.yaml"
            sed -i "s/\${AWS_ACCOUNT_ID}/${AWS_ACCOUNT_ID}/g" "rendered-$overlay.yaml"
            if grep -n "\${AWS_ACCOUNT_ID}" "rendered-$overlay.yaml"; then
              echo "Unresolved AWS_ACCOUNT_ID placeholder in $overlay"
              exit 1
            fi
          done

  docker:
    name: docker-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [python]
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout, auth, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          load: true
          push: false
          tags: shopcloud/${{ matrix.service }}:ci-${{ github.sha }}
          cache-from: type=gha,scope=ci-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=ci-${{ matrix.service }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: shopcloud/${{ matrix.service }}:ci-${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

  terraform-fmt:
    name: terraform-fmt
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.5

      - name: Terraform fmt
        run: terraform fmt -check -recursive terraform
