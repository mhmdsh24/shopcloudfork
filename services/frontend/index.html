<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopCloud</title>
  <link rel="stylesheet" href="/styles/theme.css" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <span class="logo">☁</span>
      <span class="name">ShopCloud</span>
    </div>
    <nav>
      <a href="#home">Home</a>
      <a href="#catalog">Catalog</a>
      <a href="#cart">Cart (<span id="cart-count">0</span>)</a>
      <a href="#account">Account</a>
    </nav>
  </header>

  <main>
    <section id="hero">
      <h1>Buy things. Host them in the cloud.</h1>
      <p class="lede">A demo storefront running on EKS + Aurora Global Database + CloudFront.</p>
      <button class="cta" onclick="loadCatalog()">Shop now</button>
    </section>

    <section id="catalog">
      <h2>Catalog</h2>
      <div id="products" class="grid"></div>
    </section>

    <section id="cart">
      <h2>Your cart</h2>
      <div id="cart-items"></div>
      <div id="cart-total"></div>
      <button id="checkout-btn" class="cta" onclick="checkout()">Checkout</button>
    </section>

    <section id="status" aria-live="polite"></section>
  </main>

  <footer>
    <small>
      ShopCloud demo &middot; region <span id="region">—</span> &middot;
      <a href="/healthz">health</a>
    </small>
  </footer>

  <script src="/app.js"></script>
</body>
</html>
