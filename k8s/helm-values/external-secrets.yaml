# helm repo add external-secrets https://charts.external-secrets.io
# Prefer scripts/install-external-secrets.ps1 so the IRSA role ARN is injected
# before Helm applies the chart.
serviceAccount:
  create: true
  name: external-secrets
  annotations:
    # Required: override this placeholder before install/upgrade.
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/shopcloud-primary-irsa-external-secrets
webhook:
  serviceAccount:
    create: true
certController:
  serviceAccount:
    create: true
resources:
  requests: { cpu: 20m, memory: 64Mi }
  limits:   { cpu: 100m, memory: 128Mi }
