# dev-us-east-1 and primary-us-east-1 share this AWS account. dev already
# owns the unprefixed "shopcloud/*" Secrets Manager paths (base's default,
# unpatched here previously since primary had zero overlay patches before
# this file), so primary's Terraform now writes its secrets under
# "shopcloud-primary/*" instead (see terraform/environments/primary-us-east-1
# /phase2_data.tf). This patch points primary's ExternalSecrets at those
# names so they don't try to read dev's secrets.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: catalog-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target:
    name: catalog-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef: { key: shopcloud-primary/db/master, property: host }
    - secretKey: DB_PORT
      remoteRef: { key: shopcloud-primary/db/master, property: port }
    - secretKey: DB_NAME
      remoteRef: { key: shopcloud-primary/db/master, property: dbname }
    - secretKey: DB_USER
      remoteRef: { key: shopcloud-primary/db/master, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: shopcloud-primary/db/master, property: password }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: cart-secrets, creationPolicy: Owner }
  data:
    - secretKey: REDIS_HOST
      remoteRef: { key: shopcloud-primary/redis/auth, property: endpoint }
    - secretKey: REDIS_PORT
      remoteRef: { key: shopcloud-primary/redis/auth, property: port }
    - secretKey: REDIS_AUTH
      remoteRef: { key: shopcloud-primary/redis/auth, property: auth_token }
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
