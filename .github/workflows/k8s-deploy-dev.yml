name: Deploy to EKS (dev)

on:
  workflow_run:
    workflows: ["Build & Push images (dev)"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      sha:
        description: Image tag (commit SHA) to deploy
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  CLUSTER: shopcloud-dev
  NAMESPACE: shopcloud

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: development
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.sha }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shopcloud-dev-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      - name: Render and apply manifests
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          TAG: ${{ steps.tag.outputs.sha }}
        run: |
          set -euo pipefail
          kubectl kustomize k8s/overlays/dev-us-east-1 > rendered-dev-us-east-1.yaml
          python3 - "$AWS_ACCOUNT_ID" "$TAG" <<'PY'
          from pathlib import Path
          import sys
          account_id = sys.argv[1]
          tag = sys.argv[2]
          p = Path("rendered-dev-us-east-1.yaml")
          text = p.read_text()
          text = text.replace("${AWS_ACCOUNT_ID}", account_id)
          text = text.replace(":prod-latest", f":{tag}")
          text = text.replace(":dev-latest", f":{tag}")
          p.write_text(text)
          PY
          kubectl apply -f rendered-dev-us-east-1.yaml

      - name: Rollout each service
        run: |
          set -euo pipefail
          for SVC in catalog cart checkout auth admin; do
            echo "Waiting for $SVC rollout"
            kubectl -n "$NAMESPACE" rollout status "deployment/$SVC" --timeout=300s
          done
