apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: shopcloud
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: shopcloud
  labels: { app: frontend, tier: web }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend, tier: web } }
    spec:
      serviceAccountName: frontend
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: frontend } }
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: frontend
          image: 781863099565.dkr.ecr.us-east-1.amazonaws.com/shopcloud/frontend:latest
          ports: [{ name: http, containerPort: 8080 }]
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits:   { cpu: 100m, memory: 64Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: cache, mountPath: /var/cache/nginx }
            - { name: tmp,   mountPath: /tmp }
      volumes:
        - { name: cache, emptyDir: {} }
        - { name: tmp,   emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: frontend, namespace: shopcloud, labels: { app: frontend } }
spec:
  type: ClusterIP
  selector: { app: frontend }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: frontend, namespace: shopcloud }
spec:
  maxUnavailable: 1
  selector: { matchLabels: { app: frontend } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: frontend, namespace: shopcloud }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend }
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: frontend, namespace: shopcloud }
spec:
  podSelector: { matchLabels: { app: frontend } }
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only the public ALB (via the VPC) reaches the frontend
    - from: [{ ipBlock: { cidr: 10.0.0.0/16 } }]
      ports: [{ port: 8080, protocol: TCP }]
  egress:
    - to: [{ namespaceSelector: {} }]
      ports: [{ port: 53, protocol: UDP }, { port: 53, protocol: TCP }]
