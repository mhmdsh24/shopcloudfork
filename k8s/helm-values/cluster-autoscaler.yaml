# helm repo add autoscaler https://kubernetes.github.io/autoscaler
# Prefer scripts/install-cluster-autoscaler.ps1 so the IRSA role ARN is
# injected before Helm applies the chart.
autoDiscovery:
  clusterName: shopcloud-primary
awsRegion: us-east-1
image:
  tag: v1.30.0
rbac:
  serviceAccount:
    create: true
    name: cluster-autoscaler
    annotations:
      # Required: override this placeholder before install/upgrade.
      eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/shopcloud-primary-irsa-cluster-autoscaler
extraArgs:
  balance-similar-node-groups: true
  skip-nodes-with-system-pods: false
  scale-down-unneeded-time: 5m
  scale-down-delay-after-add: 2m
resources:
  requests: { cpu: 50m,  memory: 96Mi }
  limits:   { cpu: 200m, memory: 256Mi }
