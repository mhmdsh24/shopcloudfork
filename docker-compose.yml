# Local integration stack: all 5 services + Redis + PostgreSQL + nginx gateway (http://localhost:8888).
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: shopcloud
      POSTGRES_USER: shopcloud_admin
      POSTGRES_PASSWORD: localdev
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  catalog:
    build: ./services/catalog
    depends_on:
      - postgres
    environment:
      LOG_LEVEL: info
      AWS_REGION: us-east-1
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shopcloud
      DB_USER: shopcloud_admin
      DB_PASSWORD: localdev

  cart:
    build: ./services/cart
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_LEVEL: info
      AWS_REGION: us-east-1

  checkout:
    build: ./services/checkout
    depends_on:
      - postgres
    environment:
      INVOICE_QUEUE_URL: ""
      LOG_LEVEL: info
      AWS_REGION: us-east-1
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shopcloud
      DB_USER: shopcloud_admin
      DB_PASSWORD: localdev

  auth:
    build: ./services/auth
    environment:
      AWS_REGION: us-east-1
      CUSTOMER_POOL_ID: us-east-1_mockpool
      CUSTOMER_CLIENT_ID: mockcustomerclient
      ADMIN_POOL_ID: us-east-1_mockpooladmin
      ADMIN_CLIENT_ID: mockadminclient

  admin:
    build: ./services/admin
    depends_on:
      - postgres
    environment:
      LOG_LEVEL: info
      AWS_REGION: us-east-1
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: shopcloud
      DB_USER: shopcloud_admin
      DB_PASSWORD: localdev
      ADMIN_POOL_ID: us-east-1_mockpooladmin
      ADMIN_CLIENT_ID: mockadminclient

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - catalog
      - cart
      - checkout
      - auth
      - admin
    ports:
      - "8888:80"
    volumes:
      - ./deploy/nginx-local-gateway.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
