  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: checkout-secrets, creationPolicy: Owner }
  data:
    - secretKey: DB_HOST
      remoteRef: { key: shopcloud-primary/db/master, property: host }
    - secretKey: DB_PORT
      remoteRef: { key: shopcloud-primary/db/master, property: port }
    - secretKey: DB_NAME
      remoteRef: { key: shopcloud-primary/db/master, property: dbname }
    - secretKey: DB_USER
      remoteRef: { key: shopcloud-primary/db/master, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: shopcloud-primary/db/master, property: password }
    - secretKey: REDIS_HOST
