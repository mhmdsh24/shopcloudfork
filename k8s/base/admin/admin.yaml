apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin
  namespace: shopcloud
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::781863099565:role/shopcloud-primary-irsa-admin
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: shopcloud
  labels: { app: admin, tier: api }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: admin } }
  template:
    metadata: { labels: { app: admin, tier: api } }
    spec:
      serviceAccountName: admin
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: admin } }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: admin
          image: 781863099565.dkr.ecr.us-east-1.amazonaws.com/shopcloud/admin:latest
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: LOG_LEVEL, value: info }
            - { name: AWS_REGION, value: us-east-1 }
          envFrom:
            - secretRef: { name: admin-secrets, optional: true }
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: admin, namespace: shopcloud, labels: { app: admin } }
spec:
  type: ClusterIP
  selector: { app: admin }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: admin, namespace: shopcloud }
spec:
  maxUnavailable: 1
  selector: { matchLabels: { app: admin } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: admin, namespace: shopcloud }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: admin }
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: admin, namespace: shopcloud }
spec:
  podSelector: { matchLabels: { app: admin } }
  policyTypes: ["Ingress", "Egress"]
  ingress:
    # Only reachable through the internal ALB (VPN-only)
    - from: [{ ipBlock: { cidr: 10.0.10.0/23 } }]
      ports: [{ port: 8080, protocol: TCP }]
  egress:
    - to: [{ namespaceSelector: {} }]
      ports: [{ port: 53, protocol: UDP }, { port: 53, protocol: TCP }]
    # RDS
    - to: [{ ipBlock: { cidr: 10.0.20.0/23 } }]
      ports: [{ port: 5432, protocol: TCP }]
    # AWS APIs (S3, Cognito, Secrets Manager)
    - to:
        - ipBlock: { cidr: 0.0.0.0/0, except: ["169.254.169.254/32"] }
      ports: [{ port: 443, protocol: TCP }]
