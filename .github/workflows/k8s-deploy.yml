name: Deploy to EKS (prod)

on:
  workflow_run:
    workflows: ["Build & Push images (prod)"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: Image tag (commit SHA) to deploy
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER: shopcloud-primary
  NAMESPACE: shopcloud
  TARGET_ENV: prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shopcloud-primary-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Render and apply manifests
        run: |
          set -euo pipefail
          kubectl kustomize k8s/overlays/us-east-1 > rendered-us-east-1.yaml
          python3 - "${{ secrets.AWS_ACCOUNT_ID }}" <<'PY'
          from pathlib import Path
          import sys
          account_id = sys.argv[1]
          p = Path("rendered-us-east-1.yaml")
          p.write_text(p.read_text().replace("${AWS_ACCOUNT_ID}", account_id))
          PY
          kubectl apply -f rendered-us-east-1.yaml

      - name: Rollout each service
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.sha }}"
          REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          for SVC in catalog cart checkout auth admin; do
            echo "Deploying $SVC -> $TAG"
            kubectl -n "$NAMESPACE" set image "deployment/$SVC" "$SVC=$REGISTRY/shopcloud/$SVC:$TAG"
            kubectl -n "$NAMESPACE" rollout status "deployment/$SVC" --timeout=300s
          done
