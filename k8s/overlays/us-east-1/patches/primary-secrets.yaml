      remoteRef: { key: shopcloud-primary/cognito/config, property: customer_pool_id }
    - secretKey: CUSTOMER_CLIENT_ID
      remoteRef: { key: shopcloud-primary/cognito/config, property: customer_client }
    - secretKey: ADMIN_POOL_ID
      remoteRef: { key: shopcloud-primary/cognito/config, property: admin_pool_id }
    - secretKey: ADMIN_CLIENT_ID
      remoteRef: { key: shopcloud-primary/cognito/config, property: admin_client }
---
