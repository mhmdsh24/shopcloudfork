# Optional reference only. Do not include this overlay while Lambda is the
# SQS consumer; Lambda already scales from the invoice queue event source.
# If invoice processing is moved into a Kubernetes worker later, point this
# ScaledObject at that consumer deployment instead of checkout.
apiVersion: keda.sh/v1alpha1
kind: TriggerAuthentication
metadata:
  name: keda-aws
  namespace: shopcloud
spec:
  podIdentity:
    provider: aws
    identityOwner: keda
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: checkout-sqs
  namespace: shopcloud
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: checkout
  pollingInterval: 30
  cooldownPeriod: 300
  minReplicaCount: 2
  maxReplicaCount: 4
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-aws
      metadata:
        queueURL: https://sqs.us-east-1.amazonaws.com/${AWS_ACCOUNT_ID}/shopcloud-primary-invoice-queue
        queueLength: "10"
        awsRegion: us-east-1
