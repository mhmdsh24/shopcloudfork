# Cluster-wide SecretStore that lets every namespace sync from AWS
# Secrets Manager using the IRSA role bound to external-secrets.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Catalog — just DB creds
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: catalog-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target:
    name: catalog-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_HOST
      remoteRef: { key: shopcloud/db/master, property: host }
    - secretKey: DB_PORT
      remoteRef: { key: shopcloud/db/master, property: port }
    - secretKey: DB_NAME
      remoteRef: { key: shopcloud/db/master, property: dbname }
    - secretKey: DB_USER
      remoteRef: { key: shopcloud/db/master, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: shopcloud/db/master, property: password }
---
# Cart — Redis
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cart-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: cart-secrets, creationPolicy: Owner }
  data:
    - secretKey: REDIS_HOST
      remoteRef: { key: shopcloud/redis/auth, property: endpoint }
    - secretKey: REDIS_PORT
      remoteRef: { key: shopcloud/redis/auth, property: port }
    - secretKey: REDIS_AUTH
      remoteRef: { key: shopcloud/redis/auth, property: auth_token }
---
# Checkout — DB + Redis + (event bus already in envVar)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: checkout-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: checkout-secrets, creationPolicy: Owner }
  data:
    - secretKey: DB_HOST
      remoteRef: { key: shopcloud/db/master, property: host }
    - secretKey: DB_USER
      remoteRef: { key: shopcloud/db/master, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: shopcloud/db/master, property: password }
    - secretKey: REDIS_HOST
      remoteRef: { key: shopcloud/redis/auth, property: endpoint }
    - secretKey: REDIS_AUTH
      remoteRef: { key: shopcloud/redis/auth, property: auth_token }
---
# Auth — Cognito config
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: auth-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: auth-secrets, creationPolicy: Owner }
  data:
    - secretKey: CUSTOMER_POOL_ID
      remoteRef: { key: shopcloud/cognito/config, property: customer_pool_id }
    - secretKey: CUSTOMER_CLIENT_ID
      remoteRef: { key: shopcloud/cognito/config, property: customer_client }
    - secretKey: ADMIN_POOL_ID
      remoteRef: { key: shopcloud/cognito/config, property: admin_pool_id }
    - secretKey: ADMIN_CLIENT_ID
      remoteRef: { key: shopcloud/cognito/config, property: admin_client }
---
# Admin — DB
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: admin-secrets
  namespace: shopcloud
spec:
  refreshInterval: 1h
  secretStoreRef: { name: aws-secrets, kind: ClusterSecretStore }
  target: { name: admin-secrets, creationPolicy: Owner }
  data:
    - secretKey: DB_HOST
      remoteRef: { key: shopcloud/db/master, property: host }
    - secretKey: DB_USER
      remoteRef: { key: shopcloud/db/master, property: username }
    - secretKey: DB_PASSWORD
      remoteRef: { key: shopcloud/db/master, property: password }
