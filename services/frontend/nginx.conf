# ShopCloud frontend — nginx config for a read-only static SPA.
worker_processes auto;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;
  server_tokens off;

  # Allow running as non-root, with a read-only root filesystem.
  client_body_temp_path /tmp/client_body;
  proxy_temp_path       /tmp/proxy;
  fastcgi_temp_path     /tmp/fastcgi;
  uwsgi_temp_path       /tmp/uwsgi;
  scgi_temp_path        /tmp/scgi;

  gzip             on;
  gzip_types       text/plain text/css text/javascript application/javascript application/json image/svg+xml;
  gzip_min_length  1024;

  server {
    listen 8080 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options          "DENY"               always;
    add_header X-Content-Type-Options   "nosniff"            always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), camera=(), microphone=()" always;

    location = /healthz {
      access_log off;
      default_type application/json;
      return 200 '{"status":"ok","service":"frontend"}';
    }

    location = /ready {
      access_log off;
      default_type application/json;
      return 200 '{"ready":true}';
    }

    # Long-lived cache for bundles; short cache for HTML.
    location ~* \.(css|js|svg|woff2?|ttf|png|jpg|jpeg|gif)$ {
      expires 30d;
      add_header Cache-Control "public, max-age=2592000, immutable";
      try_files $uri =404;
    }

    location / {
      add_header Cache-Control "no-cache";
      try_files $uri $uri/ /index.html;
    }
  }
}
