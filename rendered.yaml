apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  labels:
    environment: production
    region: us-east-1
  name: admin-secrets
  namespace: shopcloud
spec:
  data:
  - remoteRef:
      key: shopcloud/db/master
      property: host
    secretKey: DB_HOST
  - remoteRef:
      key: shopcloud/db/master
      property: username
    secretKey: DB_USER
  - remoteRef:
      key: shopcloud/db/master
      property: password
    secretKey: DB_PASSWORD
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets
  target:
    creationPolicy: Owner
    name: admin-secrets
