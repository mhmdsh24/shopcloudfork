name: Deploy to EKS (dev)

on:
  workflow_run:
    workflows: ["Build & Push images (dev)"]
    types: [completed]
    branches: [dev]
  workflow_dispatch:
    inputs:
      sha:
        description: Image tag (commit SHA) to deploy
        required: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CLUSTER: shopcloud-dev
  NAMESPACE: shopcloud
  ACCOUNT_ID: "781863099565"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment: development
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::781863099565:role/shopcloud-dev-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name "$CLUSTER" --region "$AWS_REGION"

      - name: Resolve image tag
        id: tag
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rollout each service
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.sha }}"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          for SVC in catalog cart checkout auth admin; do
            echo "Deploying $SVC -> $TAG"
            kubectl -n "$NAMESPACE" set image "deployment/$SVC" "$SVC=$REGISTRY/shopcloud/$SVC:$TAG"
            kubectl -n "$NAMESPACE" rollout status "deployment/$SVC" --timeout=300s
          done
