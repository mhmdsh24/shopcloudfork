apiVersion: v1
kind: ServiceAccount
metadata:
  name: checkout
  namespace: shopcloud
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::${AWS_ACCOUNT_ID}:role/shopcloud-primary-irsa-checkout
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout
  namespace: shopcloud
  labels: { app: checkout, tier: api }
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy: { type: RollingUpdate, rollingUpdate: { maxSurge: 1, maxUnavailable: 0 } }
  selector: { matchLabels: { app: checkout } }
  template:
    metadata:
      labels: { app: checkout, tier: api }
    spec:
      serviceAccountName: checkout
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector: { matchLabels: { app: checkout } }
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: checkout
          image: ${AWS_ACCOUNT_ID}.dkr.ecr.us-east-1.amazonaws.com/shopcloud/checkout:prod-latest
          imagePullPolicy: Always
          ports: [{ name: http, containerPort: 8080 }]
          env:
            - { name: LOG_LEVEL, value: info }
            - { name: AWS_REGION, value: us-east-1 }
            - { name: INVOICE_QUEUE_URL, value: "https://sqs.us-east-1.amazonaws.com/${AWS_ACCOUNT_ID}/shopcloud-primary-invoice-queue" }
          envFrom:
            - configMapRef: { name: shopcloud-config, optional: true }
            - secretRef: { name: checkout-secrets, optional: true }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 250m, memory: 128Mi }
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /ready, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - { name: tmp, emptyDir: {} }
---
apiVersion: v1
kind: Service
metadata: { name: checkout, namespace: shopcloud, labels: { app: checkout } }
spec:
  type: ClusterIP
  selector: { app: checkout }
  ports: [{ name: http, port: 8080, targetPort: http }]
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata: { name: checkout, namespace: shopcloud }
spec:
  maxUnavailable: 1
  selector: { matchLabels: { app: checkout } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: checkout, namespace: shopcloud }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: checkout }
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
