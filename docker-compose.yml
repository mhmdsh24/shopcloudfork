# Local integration stack: all 5 services + Redis + nginx gateway (http://localhost:8888).
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  catalog:
    build: ./services/catalog
    environment:
      LOG_LEVEL: info
      AWS_REGION: us-east-1

  cart:
    build: ./services/cart
    depends_on:
      - redis
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_LEVEL: info
      AWS_REGION: us-east-1

  checkout:
    build: ./services/checkout
    environment:
      # Empty: skip SQS locally; set a fake URL to exercise sqs_publish_error handling.
      INVOICE_QUEUE_URL: ""
      LOG_LEVEL: info
      AWS_REGION: us-east-1

  auth:
    build: ./services/auth
    environment:
      AWS_REGION: us-east-1
      CUSTOMER_POOL_ID: us-east-1_mockpool
      CUSTOMER_CLIENT_ID: mockcustomerclient
      ADMIN_POOL_ID: us-east-1_mockpooladmin
      ADMIN_CLIENT_ID: mockadminclient

  admin:
    build: ./services/admin
    environment:
      LOG_LEVEL: info
      AWS_REGION: us-east-1

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - catalog
      - cart
      - checkout
      - auth
      - admin
    ports:
      - "8888:80"
    volumes:
      - ./deploy/nginx-local-gateway.conf:/etc/nginx/conf.d/default.conf:ro
