name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-apply.yml"
  workflow_dispatch:
    inputs:
      only:
        description: Limit apply to a single environment (primary-us-east-1, dr-eu-west-1, global, or all)
        type: choice
        required: true
        default: all
        options:
          - all
          - environments/primary-us-east-1
          - environments/dr-eu-west-1
          - global

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-apply
  cancel-in-progress: false

jobs:
  apply:
    name: apply-${{ matrix.env }}
    runs-on: ubuntu-latest
    environment: production
    strategy:
      max-parallel: 1
      fail-fast: true
      matrix:
        include:
          - id: primary-us-east-1
            env: environments/primary-us-east-1
          - id: dr-eu-west-1
            env: environments/dr-eu-west-1
          - id: global
            env: global
    defaults:
      run:
        working-directory: terraform/${{ matrix.env }}
    steps:
      - name: Skip unselected environment
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.only != 'all' && github.event.inputs.only != matrix.env }}
        working-directory: .
        run: echo "Skipping ${{ matrix.env }}"

      - uses: actions/checkout@v4
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}

      - uses: aws-actions/configure-aws-credentials@v4
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shopcloud-primary-github-deploy
          aws-region: us-east-1

      - uses: hashicorp/setup-terraform@v3
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}
        with:
          terraform_version: 1.14.5

      - name: Build invoice lambda package inputs
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}
        working-directory: .
        run: |
          set -euo pipefail
          mkdir -p terraform/modules/sqs-lambda/build/lambda
          python3 -m pip install -r terraform/modules/sqs-lambda/lambda/requirements.txt -t terraform/modules/sqs-lambda/build/lambda \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.12 \
            --only-binary=:all:
          cp terraform/modules/sqs-lambda/lambda/handler.py terraform/modules/sqs-lambda/build/lambda/

      - run: terraform init -input=false
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}
      - run: terraform apply -auto-approve -input=false
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.only == 'all' || github.event.inputs.only == matrix.env }}
