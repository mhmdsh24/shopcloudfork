name: Build & Push images (dev)

on:
  push:
    branches: [dev]
    paths:
      - "services/**"
      - ".github/workflows/docker-build-push-dev.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: docker-dev-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  TARGET_ENV: dev

jobs:
  build:
    name: build-dev-${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [catalog, cart, checkout, auth, admin]
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/shopcloud-dev-github-deploy
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2
        id: ecr

      - uses: docker/setup-buildx-action@v3

      - name: Build image locally
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          load: true
          push: false
          tags: |
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/shopcloud/${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/shopcloud/${{ matrix.service }}:${{ env.TARGET_ENV }}-latest
          cache-from: type=gha,scope=dev-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=dev-${{ matrix.service }}

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/shopcloud/${{ matrix.service }}:${{ github.sha }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push image
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          SERVICE: ${{ matrix.service }}
          TAG: ${{ github.sha }}
          TARGET_ENV: ${{ env.TARGET_ENV }}
        run: |
          set -euo pipefail
          docker push "$REGISTRY/shopcloud/$SERVICE:$TAG"
          docker push "$REGISTRY/shopcloud/$SERVICE:$TARGET_ENV-latest"
