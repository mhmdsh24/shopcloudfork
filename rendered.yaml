apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: admin
    environment: production
    region: us-east-1
    tier: api
  name: admin
  namespace: shopcloud
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: admin
      environment: production
      region: us-east-1
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: admin
        environment: production
        region: us-east-1
        tier: api
    spec:
      containers:
      - env:
        - name: LOG_LEVEL
          value: info
        - name: AWS_REGION
          value: us-east-1
        envFrom:
        - configMapRef:
            name: shopcloud-config
            optional: true
        - secretRef:
            name: admin-secrets
            optional: true
        image: 781863099565.dkr.ecr.us-east-1.amazonaws.com/shopcloud/admin:prod-latest
        imagePullPolicy: Always
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
        name: admin
        ports:
        - containerPort: 8080
          name: http
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true
        volumeMounts:
        - mountPath: /tmp
          name: tmp
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      serviceAccountName: admin
      topologySpreadConstraints:
      - labelSelector:
          matchLabels:
            app: admin
            environment: production
            region: us-east-1
        maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: DoNotSchedule
      volumes:
      - emptyDir: {}
        name: tmp
